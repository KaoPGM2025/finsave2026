<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FinsavePro+</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Google Fonts & Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Noto Sans Thai', 'sans-serif'] },
                    colors: {
                        primary: '#2563eb', secondary: '#3b82f6',
                        darkBg: '#0f172a', darkCard: '#1e293b',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Noto Sans Thai', sans-serif; transition: background-color 0.3s, color 0.3s; }
        /* Glassmorphism */
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .dark .glass { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(16px); }
        .dark .glass-panel { background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(255, 255, 255, 0.05); }
        /* Hide Scrollbar */
        ::-webkit-scrollbar { display: none; }
        /* Transitions */
        .page-transition { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        /* Floating Nav */
        .floating-nav { bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; border-radius: 30px; padding: 10px 20px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 dark:bg-darkBg dark:text-gray-100 pb-28 selection:bg-primary selection:text-white">

    <!-- App Lockout Overlay (23:00 - 00:10) -->
    <div id="lockoutScreen" class="fixed inset-0 z-[100] bg-darkBg text-white flex flex-col items-center justify-center hidden">
        <span class="material-symbols-rounded text-6xl text-red-500 mb-4">lock_clock</span>
        <h1 class="text-2xl font-bold mb-2">ระบบปิดปรับปรุงชั่วคราว</h1>
        <p class="text-gray-400 text-center px-6">ระบบงดให้บริการในช่วงเวลา 23:00 น. - 00:10 น.<br>เพื่อประมวลผลฐานข้อมูลประจำวัน</p>
    </div>

    <!-- Main Container -->
    <div class="max-w-md mx-auto min-h-screen relative shadow-2xl dark:shadow-none bg-white/30 dark:bg-darkBg/50">
        
        <!-- Header Section -->
        <header class="flex justify-between items-center p-5 pt-8 sticky top-0 z-40 glass-panel rounded-b-3xl">
            <div class="flex items-center gap-3 cursor-pointer" onclick="toggleMenu()">
                <div class="bg-primary text-white p-2 rounded-xl shadow-lg shadow-primary/30">
                    <span class="material-symbols-rounded">wallet</span>
                </div>
                <div>
                    <h1 class="text-xl font-bold leading-tight bg-clip-text text-transparent bg-gradient-to-r from-primary to-blue-400">FinsavePro+</h1>
                    <p class="text-sm text-gray-500 dark:text-gray-400 font-medium" id="userGreeting">สวัสดี, ผู้ใช้งาน</p>
                </div>
            </div>
            <div class="flex gap-2 items-center">
                <button onclick="showAnnouncements()" class="relative p-2 rounded-full bg-gray-100 dark:bg-darkCard hover:bg-gray-200 transition">
                    <span class="material-symbols-rounded text-gray-600 dark:text-gray-300 text-xl">notifications</span>
                    <span class="absolute top-1 right-1 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white dark:border-darkBg"></span>
                </button>
                <button onclick="forceReload()" class="p-2 rounded-full bg-gray-100 dark:bg-darkCard hover:bg-gray-200 transition">
                    <span class="material-symbols-rounded text-gray-600 dark:text-gray-300 text-xl">refresh</span>
                </button>
            </div>
        </header>

        <!-- Dynamic Content Pages -->
        <main id="appContent" class="p-5">
            <!-- Pages will be injected here via JS -->
        </main>

        <!-- Floating Bottom Navigation -->
        <nav class="fixed z-50 floating-nav glass flex justify-between items-center text-sm font-medium">
            <button onclick="navTo('dashboard')" class="nav-btn flex flex-col items-center p-2 text-primary w-16" data-target="dashboard">
                <span class="material-symbols-rounded mb-1 text-[28px]">space_dashboard</span>
            </button>
            <button onclick="navTo('transaction')" class="nav-btn flex flex-col items-center p-2 text-gray-400 hover:text-primary w-16 transition" data-target="transaction">
                <span class="material-symbols-rounded mb-1 text-[28px]">add_circle</span>
            </button>
            <button onclick="navTo('analytics')" class="nav-btn flex flex-col items-center p-2 text-gray-400 hover:text-primary w-16 transition" data-target="analytics">
                <span class="material-symbols-rounded mb-1 text-[28px]">insights</span>
            </button>
            <button onclick="navTo('others')" class="nav-btn flex flex-col items-center p-2 text-gray-400 hover:text-primary w-16 transition" data-target="others">
                <span class="material-symbols-rounded mb-1 text-[28px]">apps</span>
            </button>
        </nav>

    </div>

    <!-- Modals -->
    <!-- Announcement Modal -->
    <div id="modalAnnouncement" class="fixed inset-0 z-50 hidden bg-black/50 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="glass-panel w-full max-w-sm rounded-3xl p-6 transform transition-all shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold flex items-center gap-2">
                    <span class="material-symbols-rounded text-primary">campaign</span> ประกาศจากระบบ
                </h3>
                <button onclick="closeModal('modalAnnouncement')" class="text-gray-500 hover:text-red-500"><span class="material-symbols-rounded">close</span></button>
            </div>
            <div id="announcementContent" class="text-gray-600 dark:text-gray-300 text-sm mb-6 bg-gray-50 dark:bg-darkCard p-4 rounded-xl">
                กำลังโหลดประกาศ...
            </div>
            <button onclick="fetchAnnouncements()" class="w-full bg-primary text-white p-3 rounded-xl font-medium shadow-lg shadow-primary/30 flex justify-center items-center gap-2">
                <span class="material-symbols-rounded text-sm">sync</span> รีโหลดข้อมูลด่วน
            </button>
        </div>
    </div>

    <script>
        /* --- CONFIGURATION & STATE --- */
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzYSSseGUJzHr61cSpjxZd_teSoo5RX15GMu77pdQClfMkGptw86JZQPDlq3ugdYB4s/exec';
        
        let state = {
            user: { name: "ก้าวหน้า", totalSavings: 15450, pinChanged: 0 },
            transactions: [
                { id: 1, type: 'income', amount: 500, note: 'ออมเงินรายวัน', date: new Date().toISOString() },
                { id: 2, type: 'expense', amount: 120, note: 'ค่ากาแฟ', date: new Date().toISOString() }
            ],
            goals: [
                { id: 1, name: "ซื้อ MacBook", target: 50000, current: 15000, status: 'active' }
            ],
            announcement: "ยินดีต้อนรับสู่ FinsavePro+ อัปเดตใหม่ล่าสุด!",
            aiAnalysis: "กำลังรวบรวมข้อมูล..."
        };

        /* --- SYSTEM CORE FUNCTIONS --- */

        function initApp() {
            checkTimeLockout();
            checkAutoTheme();
            updateClock();
            setInterval(checkTimeLockout, 60000); // Check every minute
            setInterval(updateClock, 1000);
            setInterval(checkAutoTheme, 60000); // Auto dark mode check
            
            // Mock fetching data from backend silently
            syncDataSilently();
            
            // AI Auto Analysis after 1 minute (simulated by 3 seconds for UX initially, then 1 min loop)
            setTimeout(generateAIAnalysis, 3000);
            setInterval(generateAIAnalysis, 60000);

            navTo('dashboard');
        }

        // 1. Time Lockout (23:00 - 00:10)
        function checkTimeLockout() {
            const now = new Date();
            const h = now.getHours();
            const m = now.getMinutes();
            const isLocked = (h === 23) || (h === 0 && m <= 10);
            
            const lockoutScreen = document.getElementById('lockoutScreen');
            if (isLocked) {
                lockoutScreen.classList.remove('hidden');
                document.body.style.overflow = 'hidden';
            } else {
                lockoutScreen.classList.add('hidden');
                document.body.style.overflow = 'auto';
            }
        }

        // 2. Auto Theme (Dark/Light)
        function checkAutoTheme() {
            const h = new Date().getHours();
            const isDarkTime = h >= 18 || h < 6; // Dark mode from 6 PM to 6 AM
            if (isDarkTime) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        }

        // 3. Clock & Date
        function updateClock() {
            const el = document.getElementById('currentTimeDisplay');
            if(el) {
                const now = new Date();
                const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute:'2-digit' };
                el.innerText = now.toLocaleDateString('th-TH', options);
            }
        }

        function forceReload() {
            // Optimistic UI reload effect without actual page refresh
            const app = document.getElementById('appContent');
            app.style.opacity = '0';
            setTimeout(() => {
                syncDataSilently();
                navTo(currentView);
                app.style.opacity = '1';
            }, 300);
        }

        /* --- API & SYNC (Silent, No errors shown to user) --- */
        async function syncDataSilently() {
            try {
                // In a real app, this fetches from APPS_SCRIPT_URL
                // fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({action: 'sync'}) });
                console.log("เชื่อมต่อฐานข้อมูลอัตโนมัติ...");
            } catch (e) {
                console.log("Sync background error, using local state.");
            }
        }

        async function fetchAnnouncements() {
            const btn = event.currentTarget;
            btn.innerHTML = '<span class="material-symbols-rounded animate-spin text-sm">sync</span> กำลังโหลด...';
            // Simulate fetch from code.gs
            setTimeout(() => {
                document.getElementById('announcementContent').innerText = state.announcement;
                btn.innerHTML = '<span class="material-symbols-rounded text-sm">sync</span> รีโหลดข้อมูลด่วน';
            }, 800);
        }

        /* --- NAVIGATION & ROUTING --- */
        let currentView = 'dashboard';
        
        function navTo(pageId) {
            currentView = pageId;
            
            // Update Nav UI
            document.querySelectorAll('.nav-btn').forEach(btn => {
                if(btn.dataset.target === pageId) {
                    btn.classList.remove('text-gray-400');
                    btn.classList.add('text-primary');
                } else {
                    btn.classList.add('text-gray-400');
                    btn.classList.remove('text-primary');
                }
            });

            const content = document.getElementById('appContent');
            content.innerHTML = getPageHTML(pageId);
            updateClock();
            
            // Re-render specific logic
            if(pageId === 'analytics') renderCharts();
        }

        function getPageHTML(pageId) {
            switch(pageId) {
                case 'dashboard':
                    return `
                    <div class="page-transition space-y-5">
                        <!-- Date & Time -->
                        <div class="text-center">
                            <span id="currentTimeDisplay" class="text-sm font-medium text-gray-500 dark:text-gray-400 bg-gray-100 dark:bg-darkCard px-4 py-1.5 rounded-full"></span>
                        </div>

                        <!-- Total Savings Card (Hero) -->
                        <div class="glass-panel p-6 rounded-3xl text-center relative overflow-hidden shadow-lg shadow-primary/10 border border-primary/20">
                            <div class="absolute top-0 right-0 p-4 opacity-10">
                                <span class="material-symbols-rounded text-8xl">account_balance</span>
                            </div>
                            <p class="text-sm font-medium text-gray-500 dark:text-gray-400 mb-1">ยอดเงินออมสะสมทั้งหมด</p>
                            <h2 class="text-4xl font-bold text-gray-800 dark:text-white mb-2 flex justify-center items-baseline gap-1">
                                ฿${state.user.totalSavings.toLocaleString()}
                            </h2>
                            <div class="inline-flex items-center gap-1 text-xs font-medium text-green-500 bg-green-50 dark:bg-green-500/10 px-2 py-1 rounded-lg">
                                <span class="material-symbols-rounded text-sm">trending_up</span> เสถียรและซิงค์แล้ว
                            </div>
                        </div>

                        <!-- AI Finsave Analysis Card -->
                        <div class="bg-gradient-to-br from-primary to-blue-600 p-5 rounded-3xl text-white shadow-xl shadow-blue-500/20 relative">
                            <div class="flex items-center justify-between mb-3">
                                <div class="flex items-center gap-2">
                                    <span class="material-symbols-rounded text-yellow-300">smart_toy</span>
                                    <h3 class="font-bold">AI Finsave วิเคราะห์เรียลไทม์</h3>
                                </div>
                                <span class="text-xs bg-white/20 px-2 py-1 rounded-full backdrop-blur-sm flex items-center gap-1">
                                    <span class="w-1.5 h-1.5 bg-green-400 rounded-full animate-pulse"></span> Auto
                                </span>
                            </div>
                            <p id="aiDashboardText" class="text-sm text-blue-50 leading-relaxed bg-black/10 p-3 rounded-xl border border-white/10">
                                ${state.aiAnalysis}
                            </p>
                        </div>

                        <!-- Favorites / Quick Actions -->
                        <div>
                            <div class="flex justify-between items-center mb-3">
                                <h3 class="font-bold text-gray-700 dark:text-gray-200">รายการโปรด</h3>
                                <button class="text-primary hover:bg-blue-50 dark:hover:bg-blue-500/10 p-1 rounded-full transition">
                                    <span class="material-symbols-rounded">add</span>
                                </button>
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div onclick="navTo('transaction')" class="glass p-4 rounded-2xl flex items-center gap-3 cursor-pointer hover:border-primary/50 transition">
                                    <div class="bg-green-100 text-green-600 p-2 rounded-xl"><span class="material-symbols-rounded">savings</span></div>
                                    <span class="font-medium text-sm">ออมด่วน</span>
                                </div>
                                <div onclick="navTo('goals')" class="glass p-4 rounded-2xl flex items-center gap-3 cursor-pointer hover:border-primary/50 transition">
                                    <div class="bg-orange-100 text-orange-600 p-2 rounded-xl"><span class="material-symbols-rounded">flag</span></div>
                                    <span class="font-medium text-sm">เป้าหมาย</span>
                                </div>
                            </div>
                        </div>
                    </div>`;
                
                case 'transaction':
                    return `
                    <div class="page-transition space-y-5">
                        <h2 class="text-xl font-bold flex items-center gap-2 mb-4">
                            <span class="material-symbols-rounded text-primary">add_circle</span> บันทึกธุรกรรม
                        </h2>
                        
                        <div class="glass-panel p-5 rounded-3xl shadow-sm">
                            <!-- Type Toggle -->
                            <div class="flex bg-gray-100 dark:bg-darkBg p-1 rounded-xl mb-5">
                                <button onclick="setTxType('income')" id="btnIncome" class="flex-1 py-2 text-sm font-bold rounded-lg bg-white dark:bg-darkCard shadow text-green-500 transition">เงินออม</button>
                                <button onclick="setTxType('expense')" id="btnExpense" class="flex-1 py-2 text-sm font-bold rounded-lg text-gray-500 dark:text-gray-400 transition">รายจ่าย</button>
                            </div>

                            <input type="hidden" id="txType" value="income">

                            <div class="space-y-4">
                                <div>
                                    <label class="text-xs font-bold text-gray-500 block mb-1">วันที่ (อัตโนมัติ)</label>
                                    <div class="bg-gray-50 dark:bg-darkBg p-3 rounded-xl text-sm text-gray-500 flex items-center gap-2 border border-gray-100 dark:border-gray-800">
                                        <span class="material-symbols-rounded text-sm">event_available</span>
                                        ${new Date().toLocaleDateString('th-TH')} (ปัจจุบัน)
                                    </div>
                                </div>

                                <div>
                                    <label class="text-xs font-bold text-gray-500 block mb-1">จำนวนเงิน (บาท)</label>
                                    <input type="number" id="txAmount" class="w-full text-3xl font-bold bg-transparent border-b-2 border-gray-200 dark:border-gray-700 focus:border-primary focus:outline-none py-2 text-gray-800 dark:text-white" placeholder="0">
                                    <!-- Quick amounts -->
                                    <div class="flex gap-2 mt-3">
                                        <button onclick="addAmount(50)" class="flex-1 bg-gray-100 dark:bg-darkBg hover:bg-gray-200 py-1.5 rounded-lg text-sm font-medium transition">+50</button>
                                        <button onclick="addAmount(100)" class="flex-1 bg-gray-100 dark:bg-darkBg hover:bg-gray-200 py-1.5 rounded-lg text-sm font-medium transition">+100</button>
                                        <button onclick="addAmount(1000)" class="flex-1 bg-gray-100 dark:bg-darkBg hover:bg-gray-200 py-1.5 rounded-lg text-sm font-medium transition">+1,000</button>
                                    </div>
                                </div>

                                <div>
                                    <label class="text-xs font-bold text-gray-500 block mb-1">บันทึกช่วยจำ</label>
                                    <input type="text" id="txNote" class="w-full bg-gray-50 dark:bg-darkBg border border-gray-100 dark:border-gray-800 p-3 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 dark:text-white" placeholder="ค่าใช้จ่าย / รายได้เรื่องอะไร?">
                                </div>

                                <button onclick="saveTransaction()" class="w-full bg-primary hover:bg-blue-600 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-primary/30 transition flex justify-center items-center gap-2 mt-2">
                                    <span class="material-symbols-rounded">save</span> ยืนยันข้อมูล
                                </button>
                            </div>
                        </div>

                        <!-- Recent Fast History -->
                        <div class="mt-6">
                            <h3 class="font-bold text-sm text-gray-500 mb-3 px-2">ประวัติล่าสุด (ลบไว)</h3>
                            <div class="space-y-2" id="recentTxList">
                                ${renderTransactions(2)}
                            </div>
                        </div>
                    </div>`;

                case 'analytics':
                    return `
                    <div class="page-transition space-y-5">
                        <h2 class="text-xl font-bold flex items-center gap-2 mb-4">
                            <span class="material-symbols-rounded text-primary">insights</span> วิเคราะห์ & สถิติ
                        </h2>

                        <!-- Time Filter -->
                        <div class="flex gap-2 mb-4 overflow-x-auto pb-2 scrollbar-hide">
                            <button class="bg-primary text-white px-4 py-1.5 rounded-full text-xs font-bold shrink-0 shadow-md">สัปดาห์นี้</button>
                            <button class="bg-gray-100 dark:bg-darkCard text-gray-500 px-4 py-1.5 rounded-full text-xs font-bold shrink-0">รายเดือน</button>
                            <button class="bg-gray-100 dark:bg-darkCard text-gray-500 px-4 py-1.5 rounded-full text-xs font-bold shrink-0">รายปี</button>
                        </div>

                        <!-- Chart Container -->
                        <div class="glass-panel p-4 rounded-3xl shadow-sm mb-4">
                            <h3 class="text-sm font-bold text-gray-700 dark:text-gray-200 mb-4">สถิติการออม vs รายจ่าย</h3>
                            <div class="relative h-48 w-full">
                                <canvas id="mainChart"></canvas>
                            </div>
                        </div>

                        <!-- Target Analysis -->
                        <div class="glass-panel p-5 rounded-3xl shadow-sm">
                            <h3 class="text-sm font-bold text-gray-700 dark:text-gray-200 mb-3 flex items-center gap-2">
                                <span class="material-symbols-rounded text-orange-500">track_changes</span> วิเคราะห์แยกสำหรับเป้าหมาย
                            </h3>
                            <div class="bg-gray-50 dark:bg-darkBg p-4 rounded-2xl">
                                <div class="flex justify-between text-sm mb-1">
                                    <span class="font-bold">ซื้อ MacBook</span>
                                    <span class="text-primary font-bold">30%</span>
                                </div>
                                <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2 mb-2">
                                    <div class="bg-primary h-2 rounded-full" style="width: 30%"></div>
                                </div>
                                <p class="text-xs text-gray-500">คาดว่าจะสำเร็จในอีก 4 เดือน หากออมตามแผน</p>
                            </div>
                        </div>
                    </div>`;

                case 'goals':
                    return `
                    <div class="page-transition space-y-5">
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-xl font-bold flex items-center gap-2">
                                <span class="material-symbols-rounded text-primary">flag</span> เป้าหมายการออม
                            </h2>
                            <button class="bg-gray-100 dark:bg-darkCard p-2 rounded-full text-primary hover:bg-gray-200 transition">
                                <span class="material-symbols-rounded text-sm">history</span>
                            </button>
                        </div>

                        <!-- Info Alert -->
                        <div class="bg-blue-50 dark:bg-blue-500/10 text-blue-600 dark:text-blue-400 p-3 rounded-xl text-xs flex gap-2 items-start">
                            <span class="material-symbols-rounded text-base">info</span>
                            <p>เงินเป้าหมายแยกจากยอดออมรวม และเมื่อครบ 100% จะถูกย้ายไปประวัติโดยอัตโนมัติ</p>
                        </div>

                        <!-- Active Goal -->
                        <div class="glass-panel p-5 rounded-3xl shadow-sm border border-orange-100 dark:border-orange-900/30">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <h3 class="font-bold text-lg">ซื้อ MacBook</h3>
                                    <p class="text-xs text-gray-500">฿15,000 / ฿50,000</p>
                                </div>
                                <div class="bg-orange-100 text-orange-600 px-2 py-1 rounded-lg text-xs font-bold">30%</div>
                            </div>
                            <div class="w-full bg-gray-100 dark:bg-darkBg rounded-full h-3 mb-5 overflow-hidden">
                                <div class="bg-gradient-to-r from-orange-400 to-primary h-3 rounded-full relative" style="width: 30%"></div>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="quickAddGoal()" class="flex-1 bg-primary text-white py-2.5 rounded-xl text-sm font-bold shadow-md hover:bg-blue-600 transition flex justify-center items-center gap-1">
                                    <span class="material-symbols-rounded text-base">add</span> เพิ่มเงิน
                                </button>
                                <button class="flex-1 bg-red-50 dark:bg-red-500/10 text-red-500 py-2.5 rounded-xl text-sm font-bold hover:bg-red-100 transition flex justify-center items-center gap-1">
                                    <span class="material-symbols-rounded text-base">remove</span> ลดเงิน
                                </button>
                            </div>
                        </div>

                        <!-- Add New Goal -->

                            <div onclick="alert('ยศปัจจุบันของคุณ: นักออมฝึกหัด\\nออมเพิ่มอีก 4,550 เพื่อเลื่อนยศเป็น นักออมดาวรุ่ง')" class="flex items-center gap-3 p-4 hover:bg-gray-50 dark:hover:bg-darkBg cursor-pointer transition border-b border-gray-50 dark:border-gray-800">

        /* --- TRANSACTION LOGIC --- */
        function setTxType(type) {
            document.getElementById('txType').value = type;
            const btnInc = document.getElementById('btnIncome');
            const btnExp = document.getElementById('btnExpense');
            if(type === 'income') {
                btnInc.className = "flex-1 py-2 text-sm font-bold rounded-lg bg-white dark:bg-darkCard shadow text-green-500 transition";
                btnExp.className = "flex-1 py-2 text-sm font-bold rounded-lg text-gray-500 dark:text-gray-400 transition";
            } else {
                btnExp.className = "flex-1 py-2 text-sm font-bold rounded-lg bg-white dark:bg-darkCard shadow text-red-500 transition";
                btnInc.className = "flex-1 py-2 text-sm font-bold rounded-lg text-gray-500 dark:text-gray-400 transition";
            }
        }

        function addAmount(val) {
            const el = document.getElementById('txAmount');
            el.value = (parseFloat(el.value || 0) + val).toString();
        }

        function saveTransaction() {
            const type = document.getElementById('txType').value;
            const amount = parseFloat(document.getElementById('txAmount').value);
            const note = document.getElementById('txNote').value || (type === 'income' ? 'ออมเงิน' : 'รายจ่าย');

            if(!amount || amount <= 0) return alert('กรุณาระบุจำนวนเงิน');

            // Optimistic Update
            const newTx = { id: Date.now(), type, amount, note, date: new Date().toISOString() };
            state.transactions.unshift(newTx);
            
            if(type === 'income') state.user.totalSavings += amount;
            else state.user.totalSavings -= amount;

            // Reset form
            document.getElementById('txAmount').value = '';
            document.getElementById('txNote').value = '';

            // Update UI instantly
            document.getElementById('recentTxList').innerHTML = renderTransactions(2);
            syncDataSilently(); // Send to Apps Script in background
        }

        function deleteTx(id) {
            // Instant Delete (Optimistic)
            state.transactions = state.transactions.filter(t => t.id !== id);
            const el = document.getElementById(`tx-${id}`);
            if(el) {
                el.style.opacity = '0';
                setTimeout(() => el.remove(), 200);
            }
            syncDataSilently(); // Send delete to backend
        }

        function renderTransactions(limit = 10) {
            if(state.transactions.length === 0) return '<p class="text-xs text-gray-400 text-center py-4">ไม่มีประวัติ</p>';
            return state.transactions.slice(0, limit).map(t => `
                <div id="tx-${t.id}" class="glass bg-white/50 dark:bg-darkCard/50 p-3 rounded-2xl flex justify-between items-center transition-all duration-200">
                    <div class="flex items-center gap-3">
                        <div class="${t.type === 'income' ? 'bg-green-100 text-green-500' : 'bg-red-100 text-red-500'} p-2 rounded-xl">
                            <span class="material-symbols-rounded text-sm">${t.type === 'income' ? 'south_west' : 'north_east'}</span>
                        </div>
                        <div>
                            <h4 class="text-sm font-bold">${t.note}</h4>
                            <p class="text-[10px] text-gray-500">${new Date(t.date).toLocaleDateString('th-TH')}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="font-bold ${t.type === 'income' ? 'text-green-500' : 'text-red-500'}">
                            ${t.type === 'income' ? '+' : '-'}฿${t.amount.toLocaleString()}
                        </span>
                        <button onclick="deleteTx(${t.id})" class="text-gray-300 hover:text-red-500 transition"><span class="material-symbols-rounded text-base">delete</span></button>
                    </div>
                </div>
            `).join('');
        }

        /* --- CHART JS --- */
        function renderCharts() {
            const ctx = document.getElementById('mainChart');
            if(!ctx) return;
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['จ.', 'อ.', 'พ.', 'พฤ.', 'ศ.', 'ส.', 'อา.'],
                    datasets: [
                        { label: 'ออม', data: [120, 190, 300, 50, 200, 300, 500], backgroundColor: '#2563eb', borderRadius: 4 },
                        { label: 'จ่าย', data: [50, 100, 40, 20, 150, 100, 200], backgroundColor: '#ef4444', borderRadius: 4 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { display: false, grid: { display: false } },
                        x: { grid: { display: false }, ticks: { font: { family: 'Noto Sans Thai', size: 10 } } }
                    }
                }
            });
        }

        /* --- UTILS & MODALS --- */
        function showAnnouncements() {
            document.getElementById('modalAnnouncement').classList.remove('hidden');
        }
        function closeModal(id) {
            document.getElementById(id).classList.add('hidden');
        }
        
        function changePinLimit() {
            if(state.user.pinChanged >= 1) {
                alert("คุณไม่สามารถแก้ไข PIN ได้อีก เนื่องจากระบบจำกัดการเปลี่ยนรหัสผ่าน 1 ครั้งเพื่อความปลอดภัย");
            } else {
                if(confirm("คุณต้องการตั้ง PIN ใหม่หรือไม่? (เปลี่ยนได้ครั้งนี้ครั้งเดียวเท่านั้น)")) {
                    state.user.pinChanged = 1;
                    alert("บันทึก PIN ใหม่เรียบร้อยแล้ว ในระบบ Local");
                    syncDataSilently();
                }
            }
        }

        function openAIChat() {
            alert("หน้าต่าง AI Chat 2.0 กำลังโหลด... (สามารถพิมพ์ปรึกษาการเงินได้ที่นี่ในเวอร์ชันถัดไป)");
        }

        function generateAIAnalysis() {
            const messages = [
                "ยอดเยี่ยม! สัปดาห์นี้คุณออมเงินได้สม่ำเสมอ แนะนำลดรายจ่ายค่ากาแฟลง 10% จะทำให้ถึงเป้าหมาย MacBook เร็วขึ้น 1 สัปดาห์",
                "วิเคราะห์เรียลไทม์: รายรับ-รายจ่ายของคุณอยู่ในเกณฑ์ 'เสถียร' ยอดเงินออมสะสมเพิ่มขึ้น 5% จากสัปดาห์ก่อน",
                "AI แนะนำ: ลองแบ่งเงิน 500 บาทที่ออมวันนี้ไปใส่ในเป้าหมาย 'ซื้อ MacBook' จะช่วยให้เห็นความก้าวหน้าชัดเจนขึ้น"
            ];
            state.aiAnalysis = messages[Math.floor(Math.random() * messages.length)];
            const el = document.getElementById('aiDashboardText');
            if(el) {
                el.style.opacity = '0';
                setTimeout(() => {
                    el.innerText = state.aiAnalysis;
                    el.style.opacity = '1';
                }, 300);
            }
        }

        function quickAddGoal() {
            alert("เพิ่มเงินเข้าเป้าหมาย (จำลอง) - เงินส่วนนี้ถูกแยกจากเงินออมหลักเรียบร้อยแล้ว");
        }

        // Init
        window.onload = initApp;

    </script>
